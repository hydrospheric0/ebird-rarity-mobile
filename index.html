<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0c1b50" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Twitcher - find eBird Rarities" />
    <title>Twitcher - find eBird Rarities</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      ;(async () => {
        const CACHE_RESET_VERSION = '2026-03-06-2'
        const CACHE_RESET_KEY = 'mrm_bootstrap_cache_reset_version'

        try {
          if (localStorage.getItem(CACHE_RESET_KEY) !== CACHE_RESET_VERSION) {
            if ('serviceWorker' in navigator) {
              const registrations = await navigator.serviceWorker.getRegistrations()
              await Promise.all(registrations.map((registration) => registration.unregister().catch(() => false)))
            }

            if ('caches' in window) {
              const keys = await caches.keys()
              await Promise.all(keys.map((key) => caches.delete(key).catch(() => false)))
            }

            localStorage.setItem(CACHE_RESET_KEY, CACHE_RESET_VERSION)
          }
        } catch (error) {
          console.warn('bootstrap cache reset skipped:', error)
        }

        // Register the SW with updateViaCache:'none' so the browser always
        // byte-checks sw.js against the network, guaranteeing that a new
        // deploy (which stamps a new SW_VERSION) triggers a re-install.
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' }).catch(() => {})
        }

        await import('./src/main.js')
      })()
    </script>
  </body>
</html>
