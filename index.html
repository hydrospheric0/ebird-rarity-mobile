    <title>Twitcher - find eBird Rarities</title>

    <link rel="icon" href="./assets/icon-EYQ1AWFl.svg" type="image/svg+xml" />

  <body>
    <div id="app"></div>
    <!-- Plain (non-module) script so Vite preserves it verbatim in the build output.
         1. Redirects to ?_v=BUILD_VER so CDN cold-miss guarantees fresh HTML on each deploy.
         2. One-time SW/cache nuke when CACHE_RESET_VERSION changes.
         3. Registers SW with updateViaCache:'none' for automatic future updates. -->
    <script>
      (function () {
        var BUILD_VER = '0.6.13'
        var CACHE_RESET_VERSION = '2026-03-06-5'
        var CACHE_RESET_KEY = 'mrm_bootstrap_cache_reset_version'

        // Step 1: if the URL doesn't have ?_v=BUILD_VER, redirect to it.
        // This forces a cache miss at the CDN edge since the URL is new each deploy.
        var sp = new URLSearchParams(location.search)
        if (sp.get('_v') !== BUILD_VER) {
          sp.set('_v', BUILD_VER)
          location.replace(location.pathname + '?' + sp.toString() + (location.hash || ''))
          return
        }
        // Step 2: strip _v from address bar so it doesn't linger.
        history.replaceState(null, '', location.pathname + (location.hash || ''))

        // Step 3: one-time full wipe of old SWs and caches, then hard-reload
        // to the versioned URL so CDN serves fresh HTML replacing any cached copy.
        function nukeAndReload() {
          try {
            var nukeDone = 0
            var nukeTotal = 0
            function maybeReload() {
              nukeDone++
              if (nukeDone >= nukeTotal) {
                localStorage.setItem(CACHE_RESET_KEY, CACHE_RESET_VERSION)
                var rsp = new URLSearchParams()
                rsp.set('_v', BUILD_VER)
                location.replace(location.pathname + '?' + rsp.toString())
              }
            }
            if (navigator.serviceWorker) {
              nukeTotal++
              navigator.serviceWorker.getRegistrations().then(function (regs) {
                var p = regs.map(function (r) { return r.unregister() })
                return Promise.all(p)
              }).then(maybeReload).catch(maybeReload)
            }
            if (window.caches) {
              nukeTotal++
              caches.keys().then(function (keys) {
                return Promise.all(keys.map(function (k) { return caches.delete(k) }))
              }).then(maybeReload).catch(maybeReload)
            }
            if (nukeTotal === 0) maybeReload()
          } catch (e) {
            try {
              localStorage.setItem(CACHE_RESET_KEY, CACHE_RESET_VERSION)
              location.replace(location.pathname + '?_v=' + BUILD_VER)
            } catch (_) {}
          }
        }
        try {
          if (localStorage.getItem(CACHE_RESET_KEY) !== CACHE_RESET_VERSION) {
            nukeAndReload()
          }
        } catch (e) {}

        // Step 4: register SW with updateViaCache:'none'.
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', function () {
            navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' })
              .catch(function () {})
          })
        }
      })()
    </script>
  </body>
</html>
