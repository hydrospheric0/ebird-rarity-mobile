<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0c1b50" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Twitcher - find eBird Rarities" />
    <title>Twitcher - find eBird Rarities</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      ;(async () => {
        const CACHE_RESET_VERSION = '2026-03-06-1'
        const CACHE_RESET_KEY = 'mrm_bootstrap_cache_reset_version'
        try {
          if (localStorage.getItem(CACHE_RESET_KEY) !== CACHE_RESET_VERSION) {
            if ('serviceWorker' in navigator) {
              const regs = await navigator.serviceWorker.getRegistrations()
              await Promise.all(regs.map((r) => r.unregister().catch(() => false)))
            }
            if ('caches' in window) {
              const keys = await caches.keys()
              await Promise.all(keys.map((k) => caches.delete(k).catch(() => false)))
            }
            localStorage.setItem(CACHE_RESET_KEY, CACHE_RESET_VERSION)
          }
        } catch (e) {
          console.warn('bootstrap cache reset skipped:', e)
        }
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' }).catch(() => {})
        }
        await import('./src/main.js')
      })()
    </script>
  </body>
</html>
